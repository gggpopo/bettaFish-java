server:
  port: 2001

spring:
  application:
    name: bettafish-app

bettafish:
  analysis:
    task-timeout: ${BETTAFISH_ANALYSIS_TASK_TIMEOUT:PT5M}
    engine-timeout: ${BETTAFISH_ANALYSIS_ENGINE_TIMEOUT:PT90S}
    max-concurrent-engines: ${BETTAFISH_ANALYSIS_MAX_CONCURRENT_ENGINES:3}
  llm:
    query:
      enabled: ${BETTAFISH_LLM_QUERY_ENABLED:false}
      api-key: ${BETTAFISH_LLM_QUERY_API_KEY:}
      base-url: ${BETTAFISH_LLM_QUERY_BASE_URL:https://api.deepseek.com}
      model-name: ${BETTAFISH_LLM_QUERY_MODEL_NAME:deepseek-chat}
      temperature: ${BETTAFISH_LLM_QUERY_TEMPERATURE:0.7}
    media:
      enabled: ${BETTAFISH_LLM_MEDIA_ENABLED:false}
      api-key: ${BETTAFISH_LLM_MEDIA_API_KEY:}
      base-url: ${BETTAFISH_LLM_MEDIA_BASE_URL:https://aihubmix.com/v1}
      model-name: ${BETTAFISH_LLM_MEDIA_MODEL_NAME:gemini-2.5-pro}
      temperature: ${BETTAFISH_LLM_MEDIA_TEMPERATURE:0.7}
    insight:
      enabled: ${BETTAFISH_LLM_INSIGHT_ENABLED:false}
      api-key: ${BETTAFISH_LLM_INSIGHT_API_KEY:}
      base-url: ${BETTAFISH_LLM_INSIGHT_BASE_URL:https://api.moonshot.cn/v1}
      model-name: ${BETTAFISH_LLM_INSIGHT_MODEL_NAME:kimi-k2}
      temperature: ${BETTAFISH_LLM_INSIGHT_TEMPERATURE:0.7}
    report:
      enabled: ${BETTAFISH_LLM_REPORT_ENABLED:false}
      api-key: ${BETTAFISH_LLM_REPORT_API_KEY:}
      base-url: ${BETTAFISH_LLM_REPORT_BASE_URL:https://aihubmix.com/v1}
      model-name: ${BETTAFISH_LLM_REPORT_MODEL_NAME:gemini-2.5-pro}
      temperature: ${BETTAFISH_LLM_REPORT_TEMPERATURE:0.7}
    forum-host:
      enabled: ${BETTAFISH_LLM_FORUM_HOST_ENABLED:false}
      api-key: ${BETTAFISH_LLM_FORUM_HOST_API_KEY:}
      base-url: ${BETTAFISH_LLM_FORUM_HOST_BASE_URL:https://api.siliconflow.cn/v1}
      model-name: ${BETTAFISH_LLM_FORUM_HOST_MODEL_NAME:Qwen/Qwen3-235B-A22B}
      temperature: ${BETTAFISH_LLM_FORUM_HOST_TEMPERATURE:0.6}
    keyword-optimizer:
      enabled: ${BETTAFISH_LLM_KEYWORD_OPTIMIZER_ENABLED:false}
      api-key: ${BETTAFISH_LLM_KEYWORD_OPTIMIZER_API_KEY:}
      base-url: ${BETTAFISH_LLM_KEYWORD_OPTIMIZER_BASE_URL:https://api.siliconflow.cn/v1}
      model-name: ${BETTAFISH_LLM_KEYWORD_OPTIMIZER_MODEL_NAME:Qwen/Qwen3-235B-A22B}
      temperature: ${BETTAFISH_LLM_KEYWORD_OPTIMIZER_TEMPERATURE:0.7}
    mindspider:
      enabled: ${BETTAFISH_LLM_MINDSPIDER_ENABLED:false}
      api-key: ${BETTAFISH_LLM_MINDSPIDER_API_KEY:}
      base-url: ${BETTAFISH_LLM_MINDSPIDER_BASE_URL:https://api.deepseek.com}
      model-name: ${BETTAFISH_LLM_MINDSPIDER_MODEL_NAME:deepseek-chat}
      temperature: ${BETTAFISH_LLM_MINDSPIDER_TEMPERATURE:0.7}
  tavily:
    base-url: ${BETTAFISH_TAVILY_BASE_URL:https://api.tavily.com}
    api-key: ${BETTAFISH_TAVILY_API_KEY:}
    max-results: ${BETTAFISH_TAVILY_MAX_RESULTS:7}
  bocha:
    base-url: ${BETTAFISH_BOCHA_BASE_URL:https://api.bocha.example}
    api-key: ${BETTAFISH_BOCHA_API_KEY:}
  database-search:
    datasource: ${BETTAFISH_DATABASE_DATASOURCE:postgresql}
    schema: ${BETTAFISH_DATABASE_SCHEMA:public}
    default-platform: ${BETTAFISH_DATABASE_DEFAULT_PLATFORM:weibo}
  sentiment-mcp:
    enabled: ${BETTAFISH_SENTIMENT_MCP_ENABLED:true}
    base-url: ${BETTAFISH_SENTIMENT_MCP_BASE_URL:http://localhost:8081}
