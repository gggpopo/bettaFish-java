<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BettaFish - 舆情分析系统</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
<div class="app">

    <!-- Header -->
    <header class="header">
        <h1>BettaFish</h1>
        <span class="subtitle">Multi-Agent 舆情分析系统</span>
        <div class="header-actions">
            <span id="connectionStatus" class="badge badge-completed">API Ready</span>
        </div>
    </header>

    <!-- Sidebar -->
    <aside class="sidebar">
        <div class="sidebar-header">
            <h2>分析任务</h2>
            <button class="btn btn-primary btn-sm" onclick="App.showCreate()">+ 新建</button>
        </div>
        <div id="taskList" class="task-list">
            <div class="detail-empty" style="padding:40px 20px">
                <p>暂无任务</p>
            </div>
        </div>
    </aside>

    <!-- Main -->
    <main class="main" id="mainContent">

        <!-- Create form (initially visible) -->
        <div id="createPanel" class="create-form fade-in">
            <h2>创建舆情分析任务</h2>
            <p style="color:var(--text-secondary);font-size:13px;margin-bottom:16px">
                输入分析主题，系统将启动多引擎并行分析、论坛辩论和报告生成
            </p>
            <div class="input-row">
                <input type="text" id="queryInput" placeholder="例：武汉大学樱花季舆情分析"
                       onkeydown="if(event.key==='Enter') App.createTask()">
                <button class="btn btn-primary" id="createBtn" onclick="App.createTask()">开始分析</button>
            </div>
        </div>

        <!-- Detail view (hidden initially) -->
        <div id="detailPanel" style="display:none">

            <!-- Task header -->
            <div class="detail-header fade-in">
                <div>
                    <h2 id="detailQuery"></h2>
                    <div class="meta">
                        <span id="detailTaskId"></span> &middot;
                        <span id="detailTime"></span>
                    </div>
                </div>
                <div style="display:flex;gap:8px;align-items:center">
                    <span id="detailStatus"></span>
                    <button class="btn btn-danger btn-sm" id="cancelBtn" onclick="App.cancelTask()" style="display:none">
                        取消
                    </button>
                </div>
            </div>

            <!-- Progress -->
            <div class="progress-bar fade-in" id="progressPanel">
                <h3>执行进度</h3>
                <div class="progress-track">
                    <div class="progress-fill" id="progressFill" style="width:0%"></div>
                </div>
                <div class="progress-steps" id="progressSteps"></div>
            </div>

            <!-- Tabs -->
            <div class="tabs" id="tabs">
                <button class="tab active" data-tab="engines" onclick="App.switchTab('engines')">引擎结果</button>
                <button class="tab" data-tab="forum" onclick="App.switchTab('forum')">论坛辩论</button>
                <button class="tab" data-tab="report" onclick="App.switchTab('report')">分析报告</button>
                <button class="tab" data-tab="events" onclick="App.switchTab('events')">事件日志</button>
            </div>

            <!-- Tab: Engines -->
            <div id="tab-engines" class="tab-content">
                <div class="engine-grid" id="engineGrid">
                    <div class="card" style="text-align:center;color:var(--text-secondary)">
                        等待引擎返回结果...
                    </div>
                </div>
            </div>

            <!-- Tab: Forum -->
            <div id="tab-forum" class="tab-content" style="display:none">
                <div class="card">
                    <h3>论坛概要</h3>
                    <p id="forumOverview" style="color:var(--text-secondary);font-size:14px">等待论坛辩论完成...</p>
                </div>
                <div class="card" id="consensusCard" style="display:none">
                    <h3>共识要点</h3>
                    <ul class="consensus-list points" id="consensusList"></ul>
                </div>
                <div class="card" id="questionsCard" style="display:none">
                    <h3>待解决问题</h3>
                    <ul class="consensus-list questions" id="questionsList"></ul>
                </div>
                <div class="card">
                    <h3>辩论记录</h3>
                    <div class="forum-timeline" id="forumTimeline">
                        <div style="text-align:center;color:var(--text-secondary);padding:20px">
                            暂无辩论记录
                        </div>
                    </div>
                </div>
            </div>

            <!-- Tab: Report -->
            <div id="tab-report" class="tab-content" style="display:none">
                <div class="card">
                    <h3 id="reportTitle">分析报告</h3>
                    <p id="reportSummary" style="color:var(--text-secondary);font-size:14px;margin-bottom:16px">
                        等待报告生成...
                    </p>
                </div>
                <div class="report-frame" id="reportFrame">
                    <div style="text-align:center;padding:60px;color:var(--text-secondary)">
                        报告将在所有引擎完成分析后生成
                    </div>
                </div>
            </div>

            <!-- Tab: Events -->
            <div id="tab-events" class="tab-content" style="display:none">
                <div class="event-log" id="eventLog">
                    <div class="event-line">
                        <span class="event-time">--:--:--</span>
                        <span class="event-type">SYSTEM</span>
                        <span class="event-data">等待事件流连接...</span>
                    </div>
                </div>
            </div>

        </div>
    </main>

</div>

<script src="/js/app.js"></script>
</body>
</html>
